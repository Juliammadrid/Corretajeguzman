<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Netlify Forms</title>
</head>
<body>
  <form name="lead-administracion" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="lead-administracion">
    <input name="bot-field">
    <input name="nombre">
    <input name="whatsapp">
    <input name="email">
    <input name="tipo">
    <input name="comuna">
    <input name="estado_arriendo">
    <input name="valor">
    <textarea name="mensaje"></textarea>
    <input name="servicio">
    <input name="plan">
    <input name="origen">
    <input name="fecha_envio">
    <input name="acepta">
  </form>
</body>
</html>
