# ============================================================
#  Netlify · Corretaje Guzmán (preview)
#  Sitio estático + funciones serverless. No requiere build.
# ============================================================
[build]
  publish = "."
  functions = "netlify/functions"

# ============================================================
# Rutas publicas limpias
# ============================================================
[[redirects]]
  from = "/"
  to = "/Home - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/inicio"
  to = "/Home - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/arriendos"
  to = "/Arriendos - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/comprar"
  to = "/Ventas - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/ventas"
  to = "/Ventas - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/parcelas"
  to = "/Parcelas - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/administracion"
  to = "/Administracion de Propiedades - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/propietarios"
  to = "/Quiero Arrendar mi Propiedad - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/solicitud"
  to = "/Formulario de Arriendo - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/corredores"
  to = "/Se Corredor - Corretaje Guzman.html"
  status = 200

[[redirects]]
  from = "/ficha"
  to = "/Ficha Propiedad - Corretaje Guzman v2.html"
  status = 200

# Archivos estáticos usados por la ficha cuando se abre desde /propiedad/...
# Estas reglas deben ir antes de /propiedad/* para que no las tape la ficha.
[[redirects]]
  from = "/propiedad/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/propiedad/uploads/*"
  to = "/uploads/:splat"
  status = 200

[[redirects]]
  from = "/propiedad/data-propiedades.js"
  to = "/data-propiedades.js"
  status = 200

[[redirects]]
  from = "/propiedad/data-rentando.js"
  to = "/data-rentando.js"
  status = 200

[[redirects]]
  from = "/propiedad/guzman-shared.js"
  to = "/guzman-shared.js"
  status = 200

[[redirects]]
  from = "/propiedad/app.js"
  to = "/app.js"
  status = 200

[[redirects]]
  from = "/propiedad/google-maps-config.js"
  to = "/google-maps-config.js"
  status = 200

[[redirects]]
  from = "/propiedad/*"
  to = "/Ficha Propiedad - Corretaje Guzman v2.html"
  status = 200

